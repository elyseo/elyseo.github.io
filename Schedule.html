<!doctype html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
<title>Schedule Assignment</title>
 <style>
  table {
    background-color: rgb(212, 231, 255);
    border: thick solid slategrey;
    font-size: 18px;
    color: darkslateblue;
    font-family: 'Gill Sans', Calibri, sans-serif;
    padding: 15px;
    margin: 30px auto;
    text-align: center;
    width: 70%;
    border-collapse: collapse;
  }
 th {
     border: 1px solid slategray;
     padding: 15px;
     background-color: Lightsteelblue;
 }
td {
    border: 1px solid slategray;
    padding: 15px;
    text-align: center;
}
     .time-column {
         background-color: #F2C4CB;
         font-weight: bold;
     }
     .highlight {
         background-color: #D1D1F0;
     }
     h1 {
         font-size: 32px;
     }
</style>
</head>
  <body>
    <h1>Daily Schedule</h1>
<table>
    <thead>
        <tr>
            <th class="time-column">Time</th>
            <th>Event</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td class="time-column">7am</td>
            <td>Exercise</td>
        </tr>
        <tr>
         <td class="time-column">8am</td>
         <td>Make Breakfast/Eat</td>
        </tr>
        <tr>
            <td class="time-column">9am</td>
            <td>Clean House</td>
        </tr>
        <tr>
            <td class="time-column">10am</td>
            <td>Grocery Shopping</td>
        </tr>
        <tr>
            <td class="time-column">11am</td>
            <td>Read/Relax</td>
        </tr>
        <tr>
        <td class="time-column">12pm</td>
        <td>Make Lunch/Eat</td>
        </tr>
        <tr class="highlight">
            <td class="time-column">1pm</td>
            <td>Bake Cake!!</td>
        </tr>
        <tr>
            <td class="time-column">2pm</td>
            <td>Read/Relax</td>
        </tr>
    </tbody>
</table>

</body>
</html>
