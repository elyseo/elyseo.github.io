<!doctype html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
<title>Reveiw Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,
    wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after {box-sizing; border-box; margin: 0; padding: 0;}

  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --border: #2a2a2a;
    --acent: #e8ff47;
    --accent2: #ff5c5c;
    --text: #f0f0f0;
    --muted: #666
    --card-h: 210px
  }
  body { 
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0 0 80px;
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 60px 20px 50px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent, transparent 40px,
      rgba(232,255,71,0.03) 40px,
      rgba(232,255,71,0.03) 41px,
      );
    animation: scanlines 8s linear innfinite;
  }
  @keyframes scanlines {
    from { background-position: 0 0;}
    to {background-position: 80px 0;}
  }
  h1 {
    font-family: 'Bebas Neve', sans-serif;
    font-size: clamp(3rem, 9vw, 7.5rem);
    letter-spacing: 0.06em;
    line-height: 1;
    color: var(--accent);
    animation: titleDrop 2s cubic-bezier(0.22,1,0.36,1);
    position: relative;
  }
  h1::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    color: var(--accent);
    clip-path: polygoon(0 60%, 100% 60%, 100% 100%, 0 100%);
    transform: translateX(3px);
    animation: glitch 5s infinite 2s;
  }
  @keyframes titleDrop {
    from { opacity: 0; transformL translateY(-60px) skewY(-4deg); }
    to { opacity: 1; transform: translateY(0) skewY(0); }
  }
  
</style>
