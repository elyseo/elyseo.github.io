<!doctype html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
<title>Imitation Photos</title>
<link rel="stylesheet" href="Styles.css">
</head>
<body>
    <header>
  <h1>Image Replication</h1>
  <div class="rule"></div>
   </header>
<div class="grid">
    <!-- Football Field -->
    <div class="card">
      <span class="badge">Project 1</span>
        <h2>Football Field</h2>
        <div class="p1-outer">
            <div class="p1-inner">
             <img src="CSSImages/football_field.jpg" alt="Football field"/>
         </div>
      </div>
    <!- Dinosaur -->
    <div class="card">
        <span class="badge">Project 2</span>
        <h2>Dinosaur</h2>
        <img class="p2-img" src="CSSImages/dinosaur.png" alt="Blue dinosaur hue-rotate"/>
    </div>
</div>
    <!-- Seagull-->
    <div class="card">
        <span class="badge">Project 3</span>
        <h2>Seagull</h2>
        <div class="p3-frame">
            <div class="p3-sky">
                <img src="CSSImages/seagull.png" alt="Seagull with CSS Gradient Sky"/>
            </div>
        </div>
    </div>
    <!-- Butterfly -->
    <div class="card">
        <span class="badge">Project 4</span>
        <h2>Butterfly Hue Change</h2>
        <div class="p5-wrap">
            <img src="CSSImages/butterfly.jpg" alt="Butterfly with blue hue"/>
        </div>
    </div>
    <!-- Theater -->
    <div class="card">
        <span class="badge">Project 6</span>
        <h2>Theater Stage</h2>
        <div class="p6-outer">
            <img src="CSSImages/theater_stage.jpg" alt="Theater Stage with Blur"/>
            <div class="p6-label"><span>Presenting</span></div>
        </div>
    </div>
</div>
</body>
</html>
